<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - LRC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:#f5a623;">📜 History</h2>
        <span class="link" onclick="window.location.href='dashboard.html'">⬅ Back</span>
    </div>
    <div class="card">
        <p style="color:#888; margin-bottom:15px;">All your transactions</p>
        <div id="historyList"></div>
    </div>
</div>
<script src="app.js"></script>
<script>
requireAuth();
renderHistory();
function renderHistory() {
    let data = getData()[currentUser];
    let html = '';
    if (!data.history || data.history.length === 0) { html = '<p style="color:#666;">No transactions yet</p>'; }
    else {
        data.history.slice().reverse().forEach(h => {
            let cls = h.type === 'Deposit' ? 'type-deposit' : 'type-withdraw';
            html += `<div class="history-item"><span class="${cls}">${h.type}</span><span>Rs ${h.amount}</span><span style="color:#888;">${h.date}</span><span class="status">${h.status}</span></div>`;
        });
    }
    document.getElementById('historyList').innerHTML = html;
}
</script>
</body>
            </html>

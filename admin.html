<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - LRC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:#f5a623;">⚙️ Admin Panel</h2>
        <span class="link" onclick="window.location.href='dashboard.html'">⬅ Back</span>
    </div>
    <div class="card admin-card">
        <h3 style="color:#f5a623;">👥 All Users</h3>
        <div id="adminUsersList"></div>
    </div>
    <div class="card admin-card" style="margin-top:15px;">
        <h3 style="color:#f5a623;">📊 System Stats</h3>
        <p style="color:#888;">Total Users: <span id="adminTotalUsers">0</span></p>
        <p style="color:#888;">Total Invested: Rs <span id="adminTotalInvest">0</span></p>
        <p style="color:#888;">Total Withdrawals: Rs <span id="adminTotalWithdraw">0</span></p>
    </div>
</div>
<script src="app.js"></script>
<script>
requireAuth();
let users = getUsers();
let data = getData();
let isAdmin = users[currentUser]?.role === 'admin';
if (!isAdmin) { document.body.innerHTML = '<div class="container"><div class="card"><h2 style="color:#ff6666;">⛔ Access Denied</h2><p>Admin only</p></div></div>'; }
else {
    let html = '';
    let totalInvest = 0, totalWithdraw = 0;
    for (let u in users) {
        let d = data[u] || {};
        let plans = d.plans || [];
        let active = plans.filter(p => p.active).length;
        totalInvest += d.totalInvest || 0;
        if (d.history) d.history.forEach(h => { if (h.type === 'Withdraw' && h.status === 'Completed') totalWithdraw += h.amount; });
        html += `<div style="border-bottom:1px solid #222; padding:10px 0;">
            <strong style="color:#f5a623;">${u}</strong>
            <span style="color:#888; font-size:13px;"> Email: ${users[u].email}</span>
            <span style="color:#888; font-size:13px; margin-left:10px;">Balance: Rs ${d.balance || 0}</span>
            <span style="color:#888; font-size:13px; margin-left:10px;">Active: ${active}</span>
            <span style="color:#888; font-size:13px; margin-left:10px;">Role: ${users[u].role || 'user'}</span>
            <button style="background:#cc3333; border:none; color:#fff; padding:4px 12px; border-radius:6px; cursor:pointer; margin-left:10px;" onclick="if(confirm('Delete user ${u}?')){ let u2=getUsers(); delete u2['${u}']; saveUsers(u2); let d2=getData(); delete d2['${u}']; saveData(d2); location.reload(); }">Delete</button>
            <button style="background:#f5a623; border:none; color:#000; padding:4px 12px; border-radius:6px; cursor:pointer; margin-left:5px;" onclick="let amt=prompt('Add balance to ${u} (Rs):'); if(amt){let d2=getData(); d2['${u}'].balance=(d2['${u}'].balance||0)+parseFloat(amt); saveData(d2); location.reload();}">Add Balance</button>
        </div>`;
    }
    document.getElementById('adminUsersList').innerHTML = html || '<p style="color:#666;">No users</p>';
    document.getElementById('adminTotalUsers').innerText = Object.keys(users).length;
    document.getElementById('adminTotalInvest').innerText = totalInvest;
    document.getElementById('adminTotalWithdraw').innerText = totalWithdraw;
}
</script>
</body>
</html>

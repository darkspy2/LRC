<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - LRC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:#f5a623;">⚙️ Admin Panel</h2>
        <span class="link" onclick="window.location.href='dashboard.html'">⬅ Back</span>
    </div>
    <div class="card admin-card">
        <h3 style="color:#f5a623;">👥 All Users</h3>
        <div id="adminUsersList"></div>
    </div>
    <div class="card admin-card" style="margin-top:15px;">
        <h3 style="color:#f5a623;">📊 System Stats</h3>
        <p style="color:#888;">Total Users: <span id="adminTotalUsers">0</span></p>
        <p style="color:#888;">Total Invested: Rs <span id="adminTotalInvest">0</span></p>
        <p style="color:#888;">Total Withdrawals: Rs <span id="adminTotalWithdraw">0</span></p>
    </div>
</div>
<script src="app.js"></script>
<script>
requireAuth();
var users = getUsers();
var data = getData();
var isAdmin = users[currentUser] && users[currentUser].role === 'admin';

if (!isAdmin) {
    document.body.innerHTML = '<div class="container"><div class="card"><h2 style="color:#ff6666;">⛔ Access Denied</h2><p>Admin only</p></div></div>';
} else {
    var html = '';
    var totalInvest = 0;
    var totalWithdraw = 0;
    
    for (var u in users) {
        var d = data[u] || {};
        var plans = d.plans || [];
        var active = 0;
        for (var i = 0; i < plans.length; i++) {
            if (plans[i].active) active++;
        }
        totalInvest += d.totalInvest || 0;
        if (d.history) {
            for (var j = 0; j < d.history.length; j++) {
                if (d.history[j].type === 'Withdraw' && d.history[j].status === 'Completed') {
                    totalWithdraw += d.history[j].amount;
                }
            }
        }
        html += '<div style="border-bottom:1px solid #222; padding:10px 0;">';
        html += '<strong style="color:#f5a623;">' + u + '</strong>';
        html += '<span style="color:#888; font-size:13px; margin-left:10px;">Email: ' + users[u].email + '</span>';
        html += '<span style="color:#888; font-size:13px; margin-left:10px;">Balance: Rs ' + (d.balance || 0) + '</span>';
        html += '<span style="color:#888; font-size:13px; margin-left:10px;">Active: ' + active + '</span>';
        html += '<span style="color:#888; font-size:13px; margin-left:10px;">Role: ' + (users[u].role || 'user') + '</span>';
        html += '<button style="background:#cc3333; border:none; color:#fff; padding:4px 12px; border-radius:6px; cursor:pointer; margin-left:10px;" onclick="deleteUser(\'' + u + '\')">Delete</button>';
        html += '<button style="background:#f5a623; border:none; color:#000; padding:4px 12px; border-radius:6px; cursor:pointer; margin-left:5px;" onclick="addBalance(\'' + u + '\')">Add Balance</button>';
        html += '</div>';
    }
    
    document.getElementById('adminUsersList').innerHTML = html || '<p style="color:#666;">No users</p>';
    document.getElementById('adminTotalUsers').innerText = Object.keys(users).length;
    document.getElementById('adminTotalInvest').innerText = totalInvest;
    document.getElementById('adminTotalWithdraw').innerText = totalWithdraw;
}

function deleteUser(u) {
    if (!confirm('Delete user ' + u + '?')) return;
    var users = getUsers();
    delete users[u];
    saveUsers(users);
    var data = getData();
    delete data[u];
    saveData(data);
    location.reload();
}

function addBalance(u) {
    var amt = prompt('Add balance to ' + u + ' (Rs):');
    if (!amt) return;
    var data = getData();
    if (!data[u]) data[u] = { balance: 0 };
    data[u].balance = (data[u].balance || 0) + parseFloat(amt);
    saveData(data);
    location.reload();
}
</script>
</body>
</html>

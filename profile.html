<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - LRC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:#ffcc00;">👤 Profile</h2>
        <span class="link" onclick="window.location.href='dashboard.html'">⬅ Back</span>
    </div>
    <div class="card">
        <p><strong>Username:</strong> <span id="profUser">---</span></p>
        <p><strong>Email:</strong> <span id="profEmail">---</span></p>
        <p><strong>Balance:</strong> $<span id="profBal">0</span></p>
        <p><strong>Total Invest:</strong> $<span id="profInvest">0</span></p>
        <p><strong>Total Earn:</strong> $<span id="profEarn">0</span></p>
        <button class="btn btn-danger" onclick="if(confirm('Delete account?')){localStorage.removeItem('lrc_current'); localStorage.removeItem('lrc_users'); localStorage.removeItem('lrc_data'); window.location.href='login.html';}">Delete Account</button>
    </div>
</div>
<script src="app.js"></script>
<script>
requireAuth();
let users = getUsers();
let data = getData()[currentUser];
document.getElementById('profUser').innerText = currentUser;
document.getElementById('profEmail').innerText = users[currentUser]?.email || 'N/A';
document.getElementById('profBal').innerText = data?.balance || 0;
document.getElementById('profInvest').innerText = data?.totalInvest || 0;
document.getElementById('profEarn').innerText = data?.totalEarn || 0;
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LRC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:#f5a623;">💰 LRC</h2>
        <div style="display:flex; gap:15px; align-items:center;">
            <span class="link" onclick="window.location.href='profile.html'" style="font-size:13px;">👤 <span id="dashUser">---</span></span>
            <span class="link" onclick="logout()" style="font-size:13px;">🚪 Logout</span>
        </div>
    </div>
    <div class="card">
        <p style="color:#888;">Total Balance</p>
        <div class="balance">Rs <span id="dashBal">0</span></div>
        <div style="display:flex; gap:20px; margin-top:10px; justify-content:center;">
            <span style="color:#aaa;">Invested: Rs <span id="dashInvest">0</span></span>
            <span style="color:#aaa;">Earned: Rs <span id="dashEarn">0</span></span>
        </div>
    </div>
    <div class="stat-grid">
        <div class="stat"><div class="num" id="dashActive">0</div><div class="label">Active Plans</div></div>
        <div class="stat"><div class="num" id="dashToday">Rs 0</div><div class="label">Today's Earning</div></div>
    </div>
    <div class="tab-bar">
        <button class="active" onclick="window.location.href='plans.html'">Plans</button>
        <button onclick="window.location.href='deposit.html'">Deposit</button>
        <button onclick="window.location.href='withdraw.html'">Withdraw</button>
        <button onclick="window.location.href='history.html'">History</button>
        <button onclick="window.location.href='referral.html'">Referral</button>
    </div>
    <div class="card" style="margin-top:10px;">
        <h3 style="color:#f5a623; font-size:16px;">📈 Quick Stats</h3>
        <p style="color:#888; font-size:13px;">Total referrals: <span id="dashRef">0</span></p>
        <p style="color:#888; font-size:13px;">Commission: Rs <span id="dashComm">0</span></p>
        <p style="color:#888; font-size:13px; margin-top:5px;"><span class="link" onclick="window.location.href='admin.html'" style="font-size:12px;">⚙️ Admin Panel</span></p>
        <button class="btn btn-outline" onclick="addToDesktop()" style="margin-top:10px; padding:10px; font-size:13px;">📲 Add to Desktop</button>
    </div>
</div>
<div id="toast" class="toast"></div>
<script src="app.js"></script>
<script>
if (!requireAuth()) {}
renderDashboard();
function renderDashboard() {
    let users = getUsers();
    let data = getData()[currentUser];
    if (!data) return;
    document.getElementById('dashUser').innerText = currentUser;
    document.getElementById('dashBal').innerText = data.balance || 0;
    document.getElementById('dashInvest').innerText = data.totalInvest || 0;
    document.getElementById('dashEarn').innerText = data.totalEarn || 0;
    document.getElementById('dashActive').innerText = (data.plans || []).filter(p => p.active).length;
    document.getElementById('dashToday').innerText = 'Rs ' + (data.todayEarn || 0);
    let count = 0; let comm = 0;
    let ref = users[currentUser]?.ref;
    for (let u in users) { if (u !== currentUser && users[u].ref && users[u].ref.includes(ref)) { count++; } }
    document.getElementById('dashRef').innerText = count;
    document.getElementById('dashComm').innerText = data.refCommission || 0;
}
function addToDesktop() {
    alert('📲 Open Chrome → Menu → Add to Home Screen');
}
</script>
</body>
</html>
